<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>食刻 ChiKe · 家庭晚餐投票</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap">

<!-- ============================================================
     食刻 ChiKe — 家庭晚餐投票（獨立網站版）
     資料存在 Firebase Realtime Database，即時同步，不需要 Claude。

     ⚠️ 使用前必做：把下方 CONFIG 區塊的 firebaseConfig 換成你自己的
     ============================================================ -->

<style>
  :root {
    --paper: #F3EEE1; --paper-dark: #E7DFC8; --ink: #221F1A;
    --stamp: #C1442E; --mustard: #DDA43F; --line: #B9AF95; --green: #5C7A4F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Space Mono', 'Courier New', monospace; color: var(--ink);
    background: var(--paper-dark); min-height: 100vh; padding: 28px 14px;
    display: flex; justify-content: center;
  }
  .wrap { width: 100%; max-width: 460px; }
  .ticket {
    background: var(--paper); border: 1.5px solid var(--ink); position: relative;
    padding: 24px 22px 34px; margin-bottom: 18px; box-shadow: 6px 6px 0 rgba(34,31,26,0.12);
  }
  .ticket::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -9px; height: 18px;
    background:
      linear-gradient(-45deg, var(--paper-dark) 6px, transparent 0) 0 4px,
      linear-gradient(45deg, var(--paper-dark) 6px, transparent 0) 0 4px;
    background-size: 16px 16px; background-repeat: repeat-x;
  }
  .eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; margin: 0 0 4px; }
  .brand { font-family: 'Archivo Black', sans-serif; font-size: 22px; letter-spacing: 1px; margin: 0 0 4px; }
  .date-line { font-size: 12px; opacity: 0.7; margin-bottom: 14px; }
  .dash { border: none; border-top: 2px dashed var(--line); margin: 16px 0; }
  .field-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.65; margin-bottom: 8px; }
  .identity-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .identity-btn {
    flex: 1; padding: 12px 6px; border: 1.5px solid var(--ink); background: #fff;
    font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .identity-btn.active { background: var(--ink); color: var(--paper); }
  .identity-btn .sub { display: block; font-size: 9px; font-weight: 400; opacity: 0.7; margin-top: 3px; }
  .identity-btn.active .sub { opacity: 0.85; }
  select.chike-select {
    width: 100%; font-family: 'Space Mono', monospace; font-size: 14px; padding: 10px;
    border: 1.5px solid var(--ink); background: #fff; outline: none; margin-bottom: 10px;
  }
  .add-dish-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .add-dish-row input {
    flex: 1; font-family: 'Space Mono', monospace; font-size: 13px; padding: 9px 10px;
    border: 1.5px solid var(--ink); outline: none;
  }
  .small-btn {
    padding: 0 12px; border: 1.5px solid var(--ink); background: var(--paper);
    font-family: 'Space Mono', monospace; font-size: 12px; cursor: pointer; white-space: nowrap;
  }
  .small-btn:hover { background: var(--ink); color: var(--paper); }
  .companion-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .companion-btn {
    padding: 9px 14px; border: 1.5px solid var(--ink); background: #fff;
    font-family: 'Space Mono', monospace; font-size: 13px; cursor: pointer;
  }
  .companion-btn.active { background: var(--mustard); }
  .primary-btn {
    width: 100%; padding: 13px; background: var(--ink); color: var(--paper);
    font-family: 'Archivo Black', sans-serif; font-size: 14px; letter-spacing: 2px;
    border: none; cursor: pointer; margin-top: 16px;
  }
  .primary-btn:hover { background: var(--stamp); }
  .primary-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .status-line { font-size: 11px; text-align: center; opacity: 0.65; margin-top: 10px; min-height: 14px; }
  .reset-btn {
    width: 100%; padding: 10px; background: transparent; color: var(--stamp);
    font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 1px;
    border: 1.5px solid var(--stamp); cursor: pointer; margin-top: 10px;
  }
  .reset-btn:hover { background: var(--stamp); color: var(--paper); }
  .switch-identity-link {
    display: block; text-align: center; font-size: 11px; opacity: 0.55; margin-top: 10px;
    text-decoration: underline; cursor: pointer; background: none; border: none; width: 100%;
    font-family: 'Space Mono', monospace;
  }
  .vote-card {
    border: 1.5px solid var(--ink); background: #fff; padding: 12px 14px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .vote-card .who { font-family: 'Archivo Black', sans-serif; font-size: 13px; width: 44px; flex-shrink: 0; }
  .vote-card .what { font-size: 13px; flex: 1; }
  .vote-card .pending { opacity: 0.4; font-style: italic; }
  .vote-card .stamp-chip {
    font-family: 'Archivo Black', sans-serif; font-size: 10px; color: var(--stamp);
    border: 2px solid var(--stamp); padding: 2px 6px; letter-spacing: 0.5px; transform: rotate(-6deg);
  }
  .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; opacity: 0.7; margin-top: 12px; justify-content: center; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.8); } }
  .tally-row { margin-bottom: 10px; }
  .tally-row .label-line { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .bar-track { height: 14px; background: #fff; border: 1.5px solid var(--ink); overflow: hidden; }
  .bar-fill { height: 100%; background: repeating-linear-gradient(45deg, var(--mustard), var(--mustard) 5px, #cf9a3a 5px, #cf9a3a 10px); transition: width 0.5s ease; }
  .footer-note { font-size: 10px; opacity: 0.5; text-align: center; margin-top: 14px; letter-spacing: 0.5px; }
  .loading-line { text-align: center; padding: 30px 0; opacity: 0.6; font-size: 13px; }
  .consensus-banner { background: var(--ink); color: var(--paper); font-family: 'Archivo Black', sans-serif; font-size: 12px; padding: 10px 12px; text-align: center; margin-bottom: 14px; letter-spacing: 0.5px; }
  .confirm-overlay { position: fixed; inset: 0; background: rgba(34,31,26,0.55); display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .confirm-overlay.show { display: flex; }
  .confirm-box { background: var(--paper); border: 1.5px solid var(--ink); max-width: 320px; width: 100%; padding: 22px 20px; box-shadow: 6px 6px 0 rgba(34,31,26,0.25); }
  .confirm-box p { font-size: 13px; line-height: 1.6; margin: 0 0 18px; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-actions button { flex: 1; padding: 10px; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 1px; border: 1.5px solid var(--ink); cursor: pointer; }
  .confirm-cancel { background: #fff; color: var(--ink); }
  .confirm-ok { background: var(--stamp); color: #fff; border-color: var(--stamp); }
  .conn-warning { background: var(--stamp); color: #fff; font-size: 11px; text-align: center; padding: 8px; margin-bottom: 14px; display: none; }
  .conn-warning.show { display: block; }
</style>
</head>
<body>

<div class="wrap">
  <div class="conn-warning" id="connWarning">⚠️ 目前連不上資料庫，請確認網路連線，或稍後重新整理</div>

  <div class="ticket" id="voteTicket">
    <p class="eyebrow">食刻 ChiKe · 家庭晚餐投票單</p>
    <div class="brand">今晚吃什麼</div>
    <div class="date-line" id="dateLine"></div>

    <div class="field-label">你是誰？</div>
    <div class="identity-row" id="identityRow"></div>

    <div id="voteForm" style="display:none;"></div>
  </div>

  <div class="ticket" id="resultsTicket">
    <p class="eyebrow">即時結果</p>
    <div class="brand" style="font-size:18px;" id="votedCountLine"></div>
    <div id="consensusBanner"></div>
    <div id="voteCards"></div>
    <div id="tallySection"></div>
    <div class="live-indicator"><span class="live-dot"></span>即時同步中（Firebase）</div>
    <p class="footer-note">恩／爸爸／媽媽三人打開這個網址都會看到同一份投票</p>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmText"></p>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="confirmCancelBtn">取消</button>
      <button class="confirm-ok" id="confirmOkBtn">確定清除</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ============================================================
   CONFIG — 把下面換成你自己 Firebase 專案的設定
   （Firebase 主控台 → 專案設定 → 一般 → 你的應用程式 → SDK 設定）
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBpFrmy6kdKMB0k2IKjtZsSXIUixbpwMnQ",
  authDomain: "click-dinner.firebaseapp.com",
  databaseURL: "https://click-dinner-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "click-dinner",
  storageBucket: "click-dinner.firebasestorage.app",
  messagingSenderId: "819415428286",
  appId: "1:819415428286:web:dc226135e96cdda2ad02ef"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const FAMILY = ["恩", "爸爸", "媽媽"];
const SOLO = "自己吃";
const DEFAULT_DISHES = [
  "綠豆湯-軟骨飯","轉角-炒飯","轉角-燴飯","轉角-炒麵","轉角-湯麵","轉角-海鮮粥",
  "轉角-魚肚粥","轉角-蚵仔粥","綠豆湯-牛肉麵","綠豆湯-榨菜肉絲麵","綠豆湯-水餃+酸辣湯",
  "華統-便當","悟饕-滷雞腿飯","悟饕-炸雞排飯","悟饕-鯖魚飯","悟饕-招牌飯",
  "悟饕-雞肉飯","悟饕-鰻魚飯","必勝客-披薩","空白","綠豆湯-酸辣湯麵"
];

function sanitizeKey(name) {
  return name.replace(/[.#$\[\]\/]/g, "_").slice(0, 60);
}
function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function todayLabel() {
  const d = new Date();
  const weekday = ["日","一","二","三","四","五","六"][d.getDay()];
  return `${d.getMonth()+1}月${d.getDate()}日（週${weekday}）· 每天自動開新的一張投票單`;
}

// ---- 全域狀態 ----
let dishes = [...DEFAULT_DISHES];
let votes = {};
let identity = localStorage.getItem("chike_identity") || null;
let selectedDish = "";
let selectedCompanion = null;
let saving = false;

document.getElementById("dateLine").textContent = todayLabel();

// ---- Firebase 連線狀態提示 ----
db.ref(".info/connected").on("value", (snap) => {
  document.getElementById("connWarning").classList.toggle("show", snap.val() !== true);
});

// ---- 初始化品項清單（只有真的完全沒有資料時才寫入預設值） ----
db.ref("dishes").once("value").then((snap) => {
  if (!snap.exists()) {
    const init = {};
    DEFAULT_DISHES.forEach((d) => (init[sanitizeKey(d)] = d));
    db.ref("dishes").set(init);
  }
});

// ---- 即時監聽品項清單 ----
db.ref("dishes").on("value", (snap) => {
  const val = snap.val();
  dishes = val ? Object.values(val) : [...DEFAULT_DISHES];
  render();
});

// ---- 即時監聽今日投票 ----
const votesRef = db.ref(`votes/${todayKey()}`);
votesRef.on("value", (snap) => {
  votes = snap.val() || {};
  render();
});

// ---- 動作 ----
function chooseIdentity(name) {
  identity = name;
  localStorage.setItem("chike_identity", name);
  const existing = votes[name];
  selectedDish = existing ? existing.dish : "";
  selectedCompanion = existing ? existing.companion : null;
  render();
}

function switchIdentity() {
  identity = null;
  localStorage.removeItem("chike_identity");
  render();
}

function addCustomDish() {
  const input = document.getElementById("customDishInput");
  const name = input.value.trim();
  if (!name) return;
  if (dishes.includes(name)) {
    selectedDish = name;
    render();
    return;
  }
  db.ref(`dishes/${sanitizeKey(name)}`).set(name).then(() => {
    selectedDish = name;
    render();
  });
}

function submitVote() {
  if (!identity || !selectedDish || !selectedCompanion || saving) return;
  saving = true;
  render();
  db.ref(`votes/${todayKey()}/${identity}`)
    .set({ dish: selectedDish, companion: selectedCompanion, ts: Date.now() })
    .then(() => {
      saving = false;
      showStatus("已儲存，所有人都看得到了");
      render();
    })
    .catch(() => {
      saving = false;
      showStatus("儲存失敗，請檢查網路後再試一次");
      render();
    });
}

let statusTimer = null;
function showStatus(msg) {
  const el = document.getElementById("statusLine");
  if (!el) return;
  el.textContent = msg;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { if (el) el.textContent = "\u00A0"; }, 2200);
}

let pendingResetIdentity = null;
function askClearVote() {
  pendingResetIdentity = identity;
  document.getElementById("confirmText").innerHTML =
    `確定要清除「${identity}」今天的投票嗎？<br>清除後會變回「尚未投票」，這個動作無法復原。`;
  document.getElementById("confirmOverlay").classList.add("show");
}
function closeConfirm() {
  document.getElementById("confirmOverlay").classList.remove("show");
}
function confirmClearVote() {
  if (pendingResetIdentity) {
    db.ref(`votes/${todayKey()}/${pendingResetIdentity}`).remove();
    selectedDish = "";
    selectedCompanion = null;
  }
  closeConfirm();
}
document.getElementById("confirmCancelBtn").onclick = closeConfirm;
document.getElementById("confirmOkBtn").onclick = confirmClearVote;
document.getElementById("confirmOverlay").onclick = (e) => {
  if (e.target.id === "confirmOverlay") closeConfirm();
};

// ---- 畫面渲染 ----
function render() {
  // 身份選擇列
  const identityRow = document.getElementById("identityRow");
  identityRow.innerHTML = FAMILY.map((name) => `
    <button class="identity-btn ${identity === name ? "active" : ""}" onclick="chooseIdentity('${name}')">
      ${name}
      <span class="sub">${votes[name] ? "已投票" : "尚未投票"}</span>
    </button>
  `).join("");

  // 投票表單
  const formEl = document.getElementById("voteForm");
  if (!identity) {
    formEl.style.display = "none";
  } else {
    formEl.style.display = "block";
    const companionOptions = [SOLO, ...FAMILY.filter((n) => n !== identity)];
    const hasVoted = !!votes[identity];
    formEl.innerHTML = `
      <hr class="dash">
      <div class="field-label">選晚餐品項</div>
      <select class="chike-select" id="dishSelect" onchange="selectedDish=this.value; render();">
        <option value="">— 請選擇 —</option>
        ${dishes.map((d) => `<option value="${d}" ${selectedDish === d ? "selected" : ""}>${d}</option>`).join("")}
      </select>
      <div class="add-dish-row">
        <input id="customDishInput" placeholder="清單沒有？在這裡新增品項" maxlength="20">
        <button class="small-btn" onclick="addCustomDish()">＋新增</button>
      </div>
      <div class="field-label">和誰一起吃？</div>
      <div class="companion-row">
        ${companionOptions.map((opt) => `
          <button class="companion-btn ${selectedCompanion === opt ? "active" : ""}"
                  onclick="selectedCompanion='${opt}'; render();">${opt}</button>
        `).join("")}
      </div>
      <button class="primary-btn" id="submitBtn"
              onclick="submitVote()"
              ${(!selectedDish || !selectedCompanion || saving) ? "disabled" : ""}>
        ${hasVoted ? "更新我的投票" : "送出投票"} →
      </button>
      <p class="status-line" id="statusLine">${saving ? "儲存中…" : "\u00A0"}</p>
      ${hasVoted ? `<button class="reset-btn" onclick="askClearVote()">↺ 清除我的投票</button>` : ""}
      <button class="switch-identity-link" onclick="switchIdentity()">不是我 / 換其他人操作</button>
    `;
  }

  // 結果區
  const votedCount = Object.keys(votes).length;
  document.getElementById("votedCountLine").textContent = `${votedCount} / ${FAMILY.length} 人已投票`;

  const allSameDish = votedCount === FAMILY.length &&
    new Set(Object.values(votes).map((v) => v.dish)).size === 1;
  document.getElementById("consensusBanner").innerHTML = allSameDish
    ? `<div class="consensus-banner">🎉 恩、爸爸、媽媽都選了「${votes[FAMILY[0]].dish}」！</div>`
    : "";

  document.getElementById("voteCards").innerHTML = FAMILY.map((name) => {
    const v = votes[name];
    return `
      <div class="vote-card">
        <span class="who">${name}</span>
        ${v
          ? `<span class="what">${v.dish}　·　${v.companion === SOLO ? "自己吃" : "跟" + v.companion}</span>`
          : `<span class="what pending">尚未投票</span>`}
        ${v ? `<span class="stamp-chip">已投</span>` : ""}
      </div>
    `;
  }).join("");

  const tally = {};
  Object.values(votes).forEach((v) => { if (v && v.dish) tally[v.dish] = (tally[v.dish] || 0) + 1; });
  const maxTally = Math.max(1, ...Object.values(tally));
  const entries = Object.entries(tally).sort((a, b) => b[1] - a[1]);
  document.getElementById("tallySection").innerHTML = entries.length === 0 ? "" : `
    <hr class="dash">
    <div class="field-label">品項統計</div>
    ${entries.map(([dish, count]) => `
      <div class="tally-row">
        <div class="label-line"><span>${dish}</span><span>${count} 票</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(count / maxTally) * 100}%"></div></div>
      </div>
    `).join("")}
  `;
}

// 把需要從 inline onclick 呼叫的函式掛到 window
window.chooseIdentity = chooseIdentity;
window.switchIdentity = switchIdentity;
window.addCustomDish = addCustomDish;
window.submitVote = submitVote;
window.askClearVote = askClearVote;

render();
</script>
</body>
</html>
